<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public
    ProxyPreserveHost On

    ProxyPass /file-gateway/ http://file-server/
    ProxyPassReverse /file-gateway/ http://file-server/

    <Directory /var/www/html/public>
        Options -Indexes
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>
</VirtualHost>
