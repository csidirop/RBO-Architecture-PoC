<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public
    ProxyPreserveHost On

    # Keycloak login via mod_auth_openidc:
    # The browser uses the host-facing Keycloak URL, while Apache uses the internal Docker URL for back-channel token and JWKS requests.
    # The OIDCProvider* directives tell mod_auth_openidc where to find the Keycloak endpoints and how to authenticate with Keycloak when exchanging the authorization code for tokens:
    OIDCProviderIssuer ${KEYCLOAK_BROWSER_BASE_URL}/realms/${KEYCLOAK_REALM}
    OIDCProviderAuthorizationEndpoint ${KEYCLOAK_BROWSER_BASE_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
    OIDCProviderTokenEndpoint ${KEYCLOAK_INTERNAL_BASE_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
    OIDCProviderJwksUri ${KEYCLOAK_INTERNAL_BASE_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
    # The client ID and secret are used by mod_auth_openidc to authenticate with Keycloak when exchanging the authorization code for tokens:
    OIDCClientID ${KEYCLOAK_CLIENT_ID}
    # The client secret is only needed if the Keycloak client is configured as "confidential". For a "public" client, this can be left out and mod_auth_openidc will skip the client authentication step:
    OIDCClientSecret ${KEYCLOAK_CLIENT_SECRET}
    # This is the URL Keycloak redirects to after a successful login:
    OIDCRedirectURI ${APP_BASE_URL}/oidc/callback
    # This passphrase is used to encrypt the session cookie that mod_auth_openidc creates after a successful login:
    OIDCCryptoPassphrase ${APP_SECRET_KEY}
    # The scope determines which claims Keycloak includes in the ID token:
    OIDCScope "openid profile email roles"
    OIDCClaimPrefix OIDC_CLAIM_
    OIDCPassClaimsAs environment none
    OIDCRemoteUserClaim preferred_username
    OIDCUnAutzAction 403

    # Public and protected files both live on the file server. The protected path (/file-proxy) needs a token.
    ProxyPassMatch "^/unprotected/(.+)$" "http://file-server/unprotected/$1"
    ProxyPassReverse "/unprotected/" "http://file-server/unprotected/"
    ProxyPassMatch "^/file-proxy/(.+)$" "http://file-server/protected/$1"
    ProxyPassReverse "/file-proxy/" "http://file-server/protected/"

    # Let PHP serve the landing page and route unknown app paths through index.php:
    <Directory /var/www/html/public>
        Options -Indexes
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>

    # Visiting /login forces Apache to complete the OIDC login before PHP sees the request:
    <Location "/login">
        AuthType openid-connect
        Require valid-user
    </Location>

    # This callback URL is owned by mod_auth_openidc and must be registered in Keycloak:
    <Location "/oidc/callback">
        AuthType openid-connect
        Require valid-user
    </Location>

    # File requests require an authenticated Keycloak session first; PHP then applies the local role/path policy and mints the downstream file-access JWT.
    <LocationMatch "^/request-file/">
        AuthzSendForbiddenOnFailure On
        AuthType openid-connect
        Require valid-user
    </LocationMatch>

    # Convert the short-lived proxy cookie from PHP into the Authorization header expected by the file server, and strip browser cookies before forwarding the request.
    <LocationMatch "^/file-proxy/">
        SetEnvIfExpr "req_novary('Cookie') =~ /(?:^|;\\s*)file_access_token=([^;]+)/" FILE_ACCESS_TOKEN=$1
        RequestHeader unset Authorization
        RequestHeader set Authorization "Bearer %{FILE_ACCESS_TOKEN}e" env=FILE_ACCESS_TOKEN
        RequestHeader unset Cookie
    </LocationMatch>
</VirtualHost>
