<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public
    RewriteEngine On
    # Expose demo files that intentionally bypass the protected token flow:
    Alias /unprotected/ /data/files/unprotected/

    # In oauth20 mode, mod_auth_openidc validates the short-lived JWT that the middle server minted and forwarded as an Authorization: Bearer header:
    OIDCClaimPrefix OIDC_CLAIM_
    OIDCOAuthVerifyCertFiles ${FILE_TOKEN_PUBLIC_CERT_PATH}
    OIDCUnAuthAction 401
    OIDCUnAutzAction 403

    # Keep the requested protected path available for future Apache-side checks. The current exact file-vs-token binding is enforced in serve.php.
    SetEnvIfExpr "%{REQUEST_URI} =~ m#^/protected/(.+)$#" REQUESTED_FILE=$1

    # Public web root for static helper pages such as index.html and error.html:
    <Directory /var/www/html/public>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Files under /data/files/unprotected are intentionally reachable without JWT validation:
    <Directory /data/files/unprotected>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Protect every /protected/... request before PHP runs. Apache verifies the token signature, then requires the expected issuer and audience claims:
    <LocationMatch "^/protected/">
        AuthzSendForbiddenOnFailure On
        AuthType oauth20
        OIDCPassClaimsAs both none
        OIDCOAuthAcceptTokenAs header
        <RequireAll>
            Require claim iss:${FILE_TOKEN_ISSUER}
            Require claim aud:${FILE_TOKEN_AUDIENCE}
        </RequireAll>
    </LocationMatch>

    # The requested protected path usually has no real file under the web root. FallbackResource sends it to serve.php after Apache token validation succeeds:
    <Directory /var/www/html/public/protected>
        Options -Indexes
        AllowOverride None
        Require all granted
        FallbackResource /serve.php
    </Directory>

    # Hide auth/path failure details from the browser in this PoC.
    ErrorDocument 401 /error.html
    ErrorDocument 403 /error.html
    ErrorDocument 404 /error.html
</VirtualHost>
