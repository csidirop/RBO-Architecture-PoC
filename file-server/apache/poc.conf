<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/public/protected>
        Options -Indexes
        AllowOverride None
        Require all granted
        FallbackResource /serve.php
    </Directory>

    ErrorDocument 403 /error.html
    ErrorDocument 404 /error.html
</VirtualHost>
