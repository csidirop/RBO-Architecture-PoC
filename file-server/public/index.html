<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apache File Server</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #f7f7f2 0%, #ebe6db 100%);
      }

      main {
        width: min(720px, calc(100% - 32px));
        background: #fff;
        border: 1px solid #d7d1c3;
        border-radius: 18px;
        padding: 28px;
      }

      code {
        background: #f0ebdf;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Apache File Server</h1>
      <p>
        Direct file access is disabled in this PoC.
      </p>
    </main>
  </body>
</html>
