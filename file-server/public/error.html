<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #fef2f2 0%, #fde2e2 100%);
        color: #581c1c;
      }

      main {
        width: min(720px, calc(100% - 32px));
        background: #fff;
        border: 1px solid #efb8b8;
        border-radius: 18px;
        padding: 28px;
      }

      a {
        color: #9d1f1f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Access Denied</h1>
      <p>
        The Apache file server did not receive a valid bearer token for this file.
        The token may be missing, expired, or not bound to the requested path.
      </p>
      <p>
        Go back to the <a href="http://localhost:8080/">middle service</a> and request the file again.
      </p>
    </main>
  </body>
</html>
