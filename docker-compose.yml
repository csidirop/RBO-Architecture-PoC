services:
  keycloak:
    image: keycloak/keycloak:latest
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/realm-import:/opt/keycloak/data/import:ro
    ports:
      - "8081:8080"

  middle:
    build:
      context: .
      dockerfile: ./middle-server/Dockerfile
    depends_on:
      - keycloak
      - file-server
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-replace-this-session-secret}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      KEYCLOAK_BROWSER_BASE_URL: ${KEYCLOAK_BROWSER_BASE_URL:-http://localhost:8081}
      KEYCLOAK_INTERNAL_BASE_URL: ${KEYCLOAK_INTERNAL_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-image-poc}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-middle-poc}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-middle-secret-please-change}
      CANTALOUPE_BASE_URL: ${CANTALOUPE_BASE_URL:-http://localhost:8182}
      REQUIRED_ROLE: ${REQUIRED_ROLE:-image-reader}
      FILES_DIRECTORY: /data/files
      FILE_TOKEN_PRIVATE_KEY_PATH: /run/secrets/file-token-private.pem
      FILE_TOKEN_TTL_SECONDS: ${FILE_TOKEN_TTL_SECONDS:-60}
      FILE_TOKEN_ISSUER: ${FILE_TOKEN_ISSUER:-middle-poc}
      FILE_TOKEN_AUDIENCE: ${FILE_TOKEN_AUDIENCE:-image-server}
    volumes:
      - ./sample-files:/data/files:ro
    ports:
      - "8080:80"

  file-server:
    build:
      context: .
      dockerfile: ./file-server/Dockerfile
    environment:
      FILE_TOKEN_PUBLIC_CERT_PATH: /etc/apache2/file-token-public.crt
      FILE_TOKEN_ISSUER: ${FILE_TOKEN_ISSUER:-middle-poc}
      FILE_TOKEN_AUDIENCE: ${FILE_TOKEN_AUDIENCE:-image-server}
    volumes:
      - ./sample-files:/data/files:ro
    ports:
      - "8090:80"

  cantaloupe:
    image: islandora/cantaloupe:6.4.3
    tty: true
    environment:
      CANTALOUPE_HTTP_PORT: 8182
      CANTALOUPE_HTTPS_ENABLED: "false"
      CANTALOUPE_SOURCE_STATIC: FilesystemSource
      CANTALOUPE_FILESYSTEMSOURCE_LOOKUP_STRATEGY: BasicLookupStrategy
      CANTALOUPE_FILESYSTEMSOURCE_BASICLOOKUPSTRATEGY_PATH_PREFIX: /data/files/protected/
      CANTALOUPE_ENDPOINT_IIIF_1_ENABLED: "false"
      CANTALOUPE_ENDPOINT_IIIF_2_ENABLED: "true"
      CANTALOUPE_ENDPOINT_IIIF_3_ENABLED: "false"
      CANTALOUPE_LOG_APPLICATION_LEVEL: info
      CANTALOUPE_HEAP_MIN: 512M
      CANTALOUPE_HEAP_MAX: 1G
    volumes:
      - ./sample-files:/data/files:ro
    ports:
      - "8182:8182"
